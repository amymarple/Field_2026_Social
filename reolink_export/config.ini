; =====================================================================
;  config.ini  -  settings for reolink_export.ahk
;  Edit values to the right of "=" . Do not add quotes.
;  Coordinates under [Coords] are filled in by running:  /calibrate
; =====================================================================

[General]
; Full path to the Reolink Client executable.
ReolinkExe=C:\Users\Cornell\AppData\Local\Programs\Reolink\Reolink.exe
; Where exported recordings are organised (per-day, per-channel subfolders are created).
ExportRoot=D:\Reolink_export
; How many camera channels / devices to export.
NumChannels=6
; hourly  = one Download per hour (default; avoids huge lists / pagination)
; full_day = one Download for the whole day (00:00:00 - 23:59:59)
ExportMode=full_day
; Which day to export, relative to today. -1 = yesterday (default).
DateOffset=-1
; 1 = go through the UI but never click the final Download button.
DryRun=0
; 1 = run calibration instead of exporting (same as /calibrate).
CalibrationMode=0
; 1 = leave Reolink Client open after the run; 0 = close it.
KeepOpenAfter=1

[Test]
; 0 = all channels; 1..6 = only that channel.
SingleChannel=0
; -1 = all hours; 0..23 = only that hour (hourly mode only).
SingleHour=-1

[Channels]
; Friendly names used in logs and folder reports. Folders are always CH01..CH06.
CH01=Channel 1
CH02=Channel 2
CH03=Channel 3
CH04=Channel 4
CH05=Channel 5
CH06=Channel 6

[Download]
; Stream quality requested in the Download window: Clear (high) or Fluent (low).
Stream=Clear
; 1 = click the Type=File and Stream options every time; 0 = leave UI as-is.
; Reolink Duo UI uses dropdowns for these and remembers them, so 0 is best:
; just set Type=File and Stream=Clear once by hand.
SetTypeStream=0

[Date]
; calendar = click date field, then click the day cell using [Calendar] geometry
; type     = click the date field, select-all, type yyyy/MM/dd, Enter (text fields)
; manual   = do not touch the date; assume it is already correct
InputMethod=calendar

[Calendar]
; Filled by /caldate. Pixel geometry of the day grid (client-relative).
; OriginX/Y = center of the Sunday cell in the first row (row 0, col 0).
; ColPitch  = horizontal px between columns; RowPitch = vertical px between weeks.
OriginX=339
OriginY=712
ColPitch=34
RowPitch=25

[Monitor]
; The folder Reolink Client downloads INTO. Must match Reolink's download-path
; setting exactly. New files appearing here are detected and moved to ExportRoot.
StagingDir=D:\Reolink_staging
; Reolink's "Temporary Folder" (Download Settings). The in-progress file lives
; here until complete; watching it tells us a download is still active.
TempDir=C:\Users\Cornell\AppData\Local\Temp\reolink
; Reolink hides the in-progress file (size/time not flushed until it closes), so
; the only reliable signal is a COMPLETED file appearing in staging. A big ~4 GB
; clip can take ~8 min to download invisibly, so "finished" = no new completed
; file for this long. Must exceed the largest single-file download time.
QuietSeconds=720
; First file can take ~5 min to appear after clicking Download. If NO file shows
; up within this long, treat the channel/day as empty. Must exceed first-file lag.
NoFileGraceMs=600000
; File extensions treated as still-downloading (not moved, not counted as done).
PartialExtensions=.tmp,.part,.download,.crdownload,.dat

[Run]
; Extra attempts per (channel,hour) after the first failure. 1 = up to 2 tries total.
Retries=1

[Window]
; Window identifier. Matching by exe is most robust (avoids matching the
; calibration dialog or other "Reolink"-named windows). Title also works,
; e.g. WinTitle=Reolink
WinTitle=ahk_exe Reolink.exe
; 1 = maximize before acting so client coordinates stay consistent.
MaximizeWindow=1
; Which monitor to put Reolink on before acting (fixes multi-display issues).
;   primary = the Windows primary/main display (recommended)
;   current = leave it wherever it is
;   1, 2 .. = a specific monitor number
; Calibrate AND run with the same value so coordinates match.
ForceMonitor=primary

[Waits]
; All values in milliseconds.
AfterLaunchMs=15000
AfterActivateMs=2000
AfterPlaybackMs=3000
AfterDateChangeMs=2000
AfterChannelSelectMs=2500
AfterChannelDropdownMs=1200
AfterOpenDownloadMs=2500
AfterChooseAllMs=1500
AfterDownloadClickMs=2500
GenericClickMs=700
PollIntervalMs=3000
; Max time to wait for ONE channel's full-day download (90 min). A whole day per
; channel is large and downloads sequentially, so this must be generous.
DownloadTimeoutMs=5400000

[Coords]
; Client-relative "x,y" coordinates. Leave blank and fill via /calibrate.
PlaybackTab=1035,71
DateSelector=362,884
DownloadIcon=1766,888
; Calendar previous-month arrow (filled by /caldate).
CalPrevMonth=508,635
; Channel is a dropdown. Capture ChannelDropdown closed, then OPEN it and
; capture each wanted channel's item position.
ChannelDropdown=85,244
ChannelItem_1=96,267
ChannelItem_2=112,293
ChannelItem_3=117,317
ChannelItem_4=128,339
ChannelItem_5=132,365
ChannelItem_6=134,391
TypeFileOption=73,382
StreamClearOption=75,494
StreamFluentOption=
StartTimeField=
EndTimeField=
ChooseAll=279,76
DownloadButton=921,77
DownloadWindowClose=954,23
